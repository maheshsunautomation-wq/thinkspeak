<!DOCTYPE html>
<html>
<head>
  <title>Custom IoT Dashboard</title>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      text-align: center;
      font-family: Arial;
      background: #1e1e2f;
      color: white;
    }

    .box {
      background: #2c2c3e;
      padding: 20px;
      margin-top: 30px;
      display: inline-block;
      border-radius: 10px;
      box-shadow: 0 0 15px black;
    }

    #data {
      font-size: 40px;
      color: #00ffcc;
    }

    canvas {
      margin-top: 30px;
      background: #2c2c3e;
      border-radius: 10px;
      padding: 10px;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>Live Temperature</h2>
  <p id="data">Loading...</p>
</div>

<h2>Custom Graph</h2>
<canvas id="myChart" width="600" height="300"></canvas>

<script>
let chart;

async function loadData() {
  const response = await fetch(
    "https://api.thingspeak.com/channels/3347121/fields/1.json?api_key=R6VXMCDZLXBDI2GK&results=10"
  );

  const result = await response.json();

  let labels = [];
  let values = [];

  result.feeds.forEach(item => {
    labels.push(new Date(item.created_at).toLocaleTimeString());
    values.push(item.field1);
  });

  // Show latest value
  document.getElementById("data").innerText = values[values.length - 1] + " °C";

  // Destroy old chart before redraw
  if (chart) chart.destroy();

  chart = new Chart(document.getElementById("myChart"), {
    type: 'line',
    data: {
      labels: labels,
      datasets: [{
        label: 'Temperature',
        data: values,
        borderColor: '#00ffcc',
        backgroundColor: 'rgba(0,255,204,0.2)',
        borderWidth: 3,
        tension: 0.4, // smooth curve
        fill: true
      }]
    },
    options: {
      scales: {
        x: {
          ticks: { color: 'white' }
        },
        y: {
          ticks: { color: 'white' }
        }
      },
      plugins: {
        legend: {
          labels: { color: 'white' }
        }
      }
    }
  });
}

// update every 10 sec
setInterval(loadData, 10000);
loadData();
</script>

</body>
</html>
